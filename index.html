<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Open in About Blank</title>
<style>
    body {
        margin: 0;
        padding: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #ece9e6, #ffffff);
        font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        color: #333;
    }
    .container {
        text-align: center;
        padding: 40px;
        background-color: rgba(255, 255, 255, 0.85);
        border-radius: 15px;
        box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        max-width: 600px;
        width: 90%;
    }
    h1 {
        font-size: 2.5em;
        margin-bottom: 20px;
        color: #2c3e50;
    }
    p {
        font-size: 1.2em;
        line-height: 1.6;
        margin-bottom: 20px;
    }
    button {
        padding: 10px 20px;
        font-size: 1.1em;
        color: #fff;
        background-color: #3498db;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: background-color 0.3s ease;
    }
    button:hover {
        background-color: #2980b9;
    }
</style>
</head>
<body>
<div class="container">
    <h1>Open Your Website in About Blank</h1>
    <p>Click the button to open your site inside a blank page that stays open.</p>
    <button onclick="openInAboutBlank()">Open Website</button>
</div>

<script>
function openInAboutBlank() {
    // Open a blank page
    const newWindow = window.open('about:blank', '_blank');

    // Write a simple HTML with iframe into that blank page
    newWindow.document.write(`
        <!DOCTYPE html>
        <html lang="en">
        <head>
            <title>Embedded Website</title>
            <style>
                html, body {
                    margin: 0;
                    height: 100%;
                    padding: 0;
                    overflow: hidden;
                    font-family: Arial, sans-serif;
                }
                iframe {
                    width: 100%;
                    height: 100%;
                    border: none;
                }
            </style>
        </head>
        <body>
            <iframe src="https://dicestack88.github.io/Tuffclient/files/1_1UT14/WASM/"></iframe>
        </body>
        </html>
    `);
}
</script>
</body>
</html>
